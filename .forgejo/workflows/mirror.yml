on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: node-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to GitHub
        run: |
          command -v ssh-keyscan >/dev/null 2>&1 || {
            apt-get update && apt-get install -y openssh-client
          }
          mkdir -p ~/.ssh
          echo "${{ secrets.MIRROR_GITHUB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git push --force \
            git@github.com:react-iot/workbench.git \
            HEAD:refs/heads/main
